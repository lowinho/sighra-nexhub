version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: journey-service
    restart: always
    environment:
      NODE_ENV:    production
      PORT:        7000
      MONGODB_URI: ${MONGODB_URI}
      USE_MOCK:    ${USE_MOCK:-false}
    ports:
      - "7000:7000"
    networks:
      - prod_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  prod_network:
    external: true
    name: infra_prod_network